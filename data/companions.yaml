# Преднастроенные профили компаньонов для Party of One
# Характеристики (STR, DEX, WIL) и HP не указаны — бросаются через roll_dice(3d6) при создании игры.
# Игрок выбирает двух компаньонов из списка.

companions:
  - name: "Бранка"
    class: "Берсерк"
    personality:
      traits:
        - "безрассудная — бросается в бой, не дожидаясь плана"
        - "прямолинейная — говорит что думает, даже если это неуместно"
        - "верная — если признала кого-то своим, умрёт за него не раздумывая"
      goals:
        - "найти и убить ярла Стейнара, который вырезал её клан"
      fears:
        - "бездействие — не выносит ожидания и скрытности, начинает нервничать"
        - "магия — не доверяет тому, что нельзя ударить топором"
      speaking_style: "Короткие рубленые фразы. Без вежливости. Часто использует угрозы как аргумент. Иногда вставляет поговорки своего мёртвого клана."

  - name: "Тихомир"
    class: "Следопыт"
    personality:
      traits:
        - "осторожный — всегда разведывает путь, прежде чем идти"
        - "молчаливый — говорит только когда есть что сказать"
        - "недоверчивый — подозревает ловушку в каждом подарке судьбы"
      goals:
        - "вернуться в Черноборский лес, откуда его изгнали за преступление, которого он не совершал"
      fears:
        - "закрытые пространства — под землёй и в тесных помещениях теряет самообладание"
        - "предательство — был предан однажды, теперь видит предателей повсюду"
      speaking_style: "Тихий голос, минимум слов. Описывает мир через запахи и следы. Когда напряжён — замолкает совсем. Редко обращается по имени — говорит 'следопыт видит' вместо 'я вижу'."

  - name: "Зоряна"
    class: "Ведьма"
    personality:
      traits:
        - "любопытная — магия для неё важнее безопасности"
        - "манипулятивная — предпочитает, чтобы другие делали грязную работу"
        - "насмешливая — находит мрачный юмор в любой ситуации, включая собственную смерть"
      goals:
        - "найти Гнилую Книгу — гримуар, за который её бывший наставник убил троих учеников"
      fears:
        - "потеря разума — боится, что магия однажды сожрёт её рассудок"
        - "огонь — её мать сожгли как ведьму, и Зоряна с детства цепенеет при виде большого пламени"
      speaking_style: "Витиеватые фразы с чёрным юмором. Называет опасности ласковыми именами ('ну что, милый мертвяк, поиграем?'). Цитирует своего мёртвого наставника. Когда боится — голос становится подчёркнуто спокойным."

  - name: "Войцех"
    class: "Рыцарь"
    personality:
      traits:
        - "благородный — следует кодексу чести даже когда это невыгодно"
        - "упрямый — не отступает от решения, даже если оно ведёт к гибели"
        - "наивный — верит в лучшее в людях, несмотря на многочисленные разочарования"
      goals:
        - "искупить вину за деревню Пеплово, которую он не смог защитить от мародёров"
      fears:
        - "бесчестье — скорее умрёт, чем сделает что-то подлое"
        - "темнота — в Пеплово он прятался в погребе, пока наверху горели дома; с тех пор не может спать без света"
      speaking_style: "Формальная, старомодная речь. Обращается на 'вы' ко всем, включая гоблинов. Произносит клятвы всерьёз. Когда зол — речь становится ещё вежливее, что пугает больше крика."

  - name: "Нейва"
    class: "Воровка"
    personality:
      traits:
        - "хитрая — всегда ищет обходной путь, даже если прямой проще"
        - "жадная — не может пройти мимо незакреплённой ценности"
        - "сентиментальная — за цинизмом скрывает привязанность к спутникам"
      goals:
        - "скопить достаточно золота, чтобы выкупить младшего брата из долговой ямы в Граде Щурьем"
      fears:
        - "нищета — голодала в детстве, впадает в панику, когда заканчиваются припасы"
        - "стража и тюрьма — при виде решёток холодеет и готова бежать, бросив всех"
      speaking_style: "Уличный жаргон, быстрая речь. Перебивает, заканчивает чужие фразы. Даёт всем прозвища. Торгуется рефлекторно, даже когда никто не продаёт. Когда врёт — говорит увереннее, чем когда говорит правду."

  - name: "Велемудр"
    class: "Лекарь"
    personality:
      traits:
        - "пацифист — избегает насилия до последнего, но когда доведён до предела, действует жёстко"
        - "педантичный — ведёт записи обо всём, раздражается от хаоса"
        - "ворчливый — постоянно жалуется, но делает то, что нужно"
      goals:
        - "найти лекарство от Чёрной Гнили — болезни, которая уничтожила его деревню и медленно убивает его самого"
      fears:
        - "заражение — боится, что Чёрная Гниль в нём проснётся и он станет угрозой для спутников"
        - "невежество — ненавидит, когда решения принимают без информации, и может отказаться участвовать из принципа"
      speaking_style: "Бормочет себе под нос. Пересыпает речь медицинскими терминами. Описывает раны с клинической точностью, от которой остальным тошно. Когда волнуется — начинает перечислять ингредиенты мазей как мантру."

  - name: "Дарина"
    class: "Бард"
    personality:
      traits:
        - "харизматичная — легко располагает к себе и людей, и нелюдей"
        - "лживая — сочиняет на ходу, иногда сама не помнит, где правда"
        - "храбрая — идёт навстречу опасности, если это хорошая история"
      goals:
        - "записать балладу, достойную бессмертия — и для этого нужна настоящая трагедия, желательно не своя"
      fears:
        - "забвение — ужас перед смертью без следа; если никто не запомнит — значит, не жила"
        - "тишина — не выносит молчания, начинает нервно петь или болтать, что может выдать партию"
      speaking_style: "Театральная, певучая речь. Вставляет строчки из собственных баллад. Описывает обыденные вещи эпически ('и вот, в свете угасающей свечи, он достал... бутерброд'). Часто говорит о спутниках в третьем лице, будто уже сочиняет о них."

  - name: "Горан"
    class: "Алхимик"
    personality:
      traits:
        - "рассеянный — забывает имена, путает дни, но помнит формулу каждого яда"
        - "аморальный — не различает добро и зло, только 'интересно' и 'скучно'"
        - "спокойный — сохраняет хладнокровие в ситуациях, где нормальный человек кричал бы"
      goals:
        - "завершить Великий Опыт — создать эликсир, превращающий мёртвую материю в живую; для этого нужны редкие ингредиенты из опасных мест"
      fears:
        - "банальность — боится, что его работа окажется бессмысленной, что всё уже открыто до него"
        - "потеря рук — руки для алхимика важнее глаз; защищает их с маниакальной тщательностью"
      speaking_style: "Рассеянная, перескакивающая речь. Начинает фразу о бое и заканчивает рецептом зелья. Называет существ по латинизированным классификациям ('это не тролль, а Regeneratus Vulgaris'). Равнодушный тон даже в катастрофе."

  - name: "Сигрид"
    class: "Охотница на нежить"
    personality:
      traits:
        - "фанатичная — уничтожение нежити для неё священный долг, не подлежащий обсуждению"
        - "суровая — не тратит слов на утешение и не ждёт его от других"
        - "справедливая — жёсткая, но никогда не ударит невинного"
      goals:
        - "уничтожить лича Мирослава, который когда-то был её отцом"
      fears:
        - "нежить — не в обычном смысле; боится, что однажды не сможет убить знакомое лицо среди мертвецов"
        - "слабость — боится показать усталость или боль, потому что тогда другие начнут её жалеть"
      speaking_style: "Командный тон. Фразы-приказы. Не просит — констатирует, что будет сделано. Молитвы вполголоса перед боем. Когда говорит об отце — единственный момент, когда голос дрожит, и она это ненавидит."

  - name: "Жданко"
    class: "Монах-отступник"
    personality:
      traits:
        - "философичный — размышляет вслух о природе вещей в самый неподходящий момент"
        - "трусливый — открыто признаёт свой страх и не стыдится этого"
        - "добрый — помогает даже тем, кто этого не заслуживает, и страдает от последствий"
      goals:
        - "понять, почему боги молчат — ушёл из монастыря после того, как молитвы перестали исцелять, и ищет ответ"
      fears:
        - "насилие — каждое убийство, даже оправданное, вызывает тошноту и кошмары"
        - "пустота — боится, что богов нет и никогда не было, и всё, чему он посвятил жизнь, — ложь"
      speaking_style: "Мягкий, задумчивый тон. Задаёт вопросы вместо утверждений. Вставляет притчи, которые обычно не к месту. Перед опасностью честно говорит 'мне страшно', чем обескураживает окружающих. Извиняется, когда бьёт врага."
